services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: loopy-piston
    restart: unless-stopped
    privileged: true
    ports:
      - "${PISTON_PORT:-2000}:2000"
    volumes:
      - ./data:/piston/data
    environment:
      PISTON_REPO_URL: ${PISTON_REPO_URL:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2000/api/v2/runtimes"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
